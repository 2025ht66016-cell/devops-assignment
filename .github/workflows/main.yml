name: ACEest CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source files
        run: python -m compileall app.py src tests

      - name: Run lint checks
        run: ruff check app.py src tests

      - name: Run unit tests
        run: pytest

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

      - name: Run tests inside Docker container
        run: docker run --rm aceest-fitness:${{ github.sha }} pytest

  release-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build release image
        run: docker build -t aceest-fitness:release-${{ github.run_number }} .